name: Build GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/open-webui-render-lite

jobs:
  go-file-extractor:
    name: Check Go file extractor
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-workers/file-extractor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: |
            go-workers/file-extractor/go.mod
            go-workers/file-extractor/go.sum

      - name: Go mod download
        run: go mod download

      - name: Go test
        run: go test ./...

  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: go-file-extractor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=render-lite-latest,enable={{is_default_branch}}
            type=sha,prefix=render-lite-
            type=ref,event=branch,prefix=render-lite-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            USE_SLIM=true
            USE_RENDER_LITE_REQUIREMENTS=true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
